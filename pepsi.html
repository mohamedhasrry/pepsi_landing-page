<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pepsi.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="sec">
        <header>
            <a href="#"><img src="logo.png" class="logo"></a>
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">What's New</a></li>
                <li><a href="#">Newsletter</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </header>
        <div class="content">
            <div class="textbook">
                <h2>that's what<br><span>I like</span></h2>
                <p>Refresh everything
                    Every Generation Refreshes The World</p>
                <a href="#">view all products</a>
            </div>
            <div class="imgbox">
                <img src="pepsi001.png" class="pepsi">
            </div>
        </div>
        <ul class="thumb">
            <li><img src="pepsi001.png" onclick="imgSlider('pepsi001.png');changeBgcolor('rgb(247, 20, 20)')"></li>
            <li><img src="pepsi002.png" onclick="imgSlider('pepsi002.png');changeBgcolor('silver')"></li>
            <li><img src="pepsi003.png" onclick="imgSlider('pepsi003.png');changeBgcolor('#1e1e1e')"></li>
        </ul>
        <ul class="sci">
            <li><a href="#"><img src="facebook.png"></a></li>
            <li><a href="#"><img src="instagram.png"></a></li>
            <li><a href="#"><img src="twitter.png"></a></li>
        </ul>
    </section>
    <script type="text/javascript">
      function imgSlider(anything){
        document.querySelector('.pepsi').src = anything;
      }
      function changeBgcolor(color){
        const sec = document.querySelector('.sec');
        sec.style.background = color;
      }
    </script>
</body>
</html>>
